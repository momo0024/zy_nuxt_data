<!DOCTYPE html>

<html {{ HTML_ATTRS }}>

  <head {{ HEAD_ATTRS }}>

    {{ HEAD }}

  </head>

  <body {{ BODY_ATTRS }}>

    {{ APP }}

    <script>

      (function () {

        var WM_ID = 'app-watermark-overlay', W = 300, H = 200, Z = 2147483647

        function color() {
          var tc = getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#334155'
          if (tc.charAt(0) === '#') {
            var r = parseInt(tc.slice(1,3), 16), g = parseInt(tc.slice(3,5), 16), b = parseInt(tc.slice(5,7), 16)
            return 'rgba(' + r + ',' + g + ',' + b + ',0.16)'
          }
          var m = tc.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/)
          if (m) return 'rgba(' + m[1] + ',' + m[2] + ',' + m[3] + ',0.16)'
          return 'rgba(0,0,0,0.16)'
        }

        function content() {

          try {

            var s = localStorage.getItem('zhizhi_user')

            if (s) { var u = JSON.parse(s); if (u && u.name) return u.name }

          } catch (e) {}

          return '智知云'

        }

        function styleText(dataUrl) {

          return 'position:fixed;inset:0;pointer-events:none;z-index:' + Z + ';background-repeat:repeat;background-size:' + W + 'px ' + H + 'px;background-image:url("' + dataUrl + '")'

        }

        function apply(dataUrl) {

          var el = document.getElementById(WM_ID)

          if (!el) {

            el = document.createElement('div')

            el.id = WM_ID

            el.setAttribute('aria-hidden', 'true')

            el.setAttribute('data-wm', '1')

            document.body.appendChild(el)

          }

          el.style.cssText = styleText(dataUrl)

        }

        function cacheKey(c, t) { return 'wm-cache:' + c + ':' + t }

        function draw(c, t) {

          var cv = document.createElement('canvas')

          cv.width = W; cv.height = H

          var x = cv.getContext('2d')

          x.translate(W / 2, H / 2)

          x.rotate(Math.PI / 4)

          x.font = '600 18px PingFang SC, Microsoft YaHei, sans-serif'

          x.fillStyle = t

          x.textAlign = 'center'

          x.textBaseline = 'middle'

          x.fillText(c, 0, 0)

          return cv.toDataURL('image/png')

        }

        function boot() {

          var c = content(), t = color(), k = cacheKey(c, t), dataUrl

          try { dataUrl = sessionStorage.getItem(k) } catch (e) {}

          if (!dataUrl) {

            dataUrl = draw(c, t)

            try { sessionStorage.setItem(k, dataUrl) } catch (e) {}

          }

          apply(dataUrl)

        }

        boot()

      })()

    </script>

  </body>

</html>
